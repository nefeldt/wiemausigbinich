name: Deploy to mittwald

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR requires a lowercase image name; the repo name may contain uppercase
      - name: Compute image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Deploy stack to mittwald
        uses: mittwald/deploy-container-action@v1
        env:
          IMAGE_TAG: ${{ env.IMAGE }}:${{ github.sha }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        with:
          api_token: ${{ secrets.MITTWALD_API_TOKEN }}
          stack_id: ${{ secrets.STACK_ID }}
          stack_file: ${{ github.workspace }}/deploy/stack.yaml
